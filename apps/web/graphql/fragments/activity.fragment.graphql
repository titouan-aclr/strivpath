fragment ActivityCard on Activity {
  id
  stravaId
  name
  type
  distance
  movingTime
  elapsedTime
  totalElevationGain
  startDate
  averageSpeed
  maxHeartrate
  kudosCount
}

fragment ActivityDetail on Activity {
  ...ActivityCard
  startDateLocal
  timezone
  averageHeartrate
  maxSpeed
  kilojoules
  deviceWatts
  hasKudoed
  averageCadence
  createdAt
  updatedAt
}
