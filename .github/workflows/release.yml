# =============================================================================
# StrivPath - Release Workflow
# =============================================================================
#
# This workflow runs on version tags (v*) to build, push, and deploy.
# It validates all tests, builds Docker images, and deploys to production.
#
# Jobs:
#   - validate: Run all tests (lint, build, unit, integration, e2e)
#   - build-and-push: Build and push Docker images to GHCR
#   - deploy: Trigger deployment to Dokploy
#
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.30.1"
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/titouan-aclr/strivpath-api
  WEB_IMAGE: ghcr.io/titouan-aclr/strivpath-web

jobs:
  # ---------------------------------------------------------------------------
  # Validate - Run all tests before release
  # ---------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: strivpath_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate GraphQL types
        run: pnpm --filter web codegen

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Generate Prisma client
        run: pnpm --filter api generate

      - name: Run database migrations
        run: pnpm --filter api db:migrate:deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/strivpath_test

      - name: Seed database
        run: pnpm --filter api db:seed
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/strivpath_test

      - name: Run API unit tests
        run: pnpm --filter api test:cov

      - name: Run Web unit tests
        run: pnpm --filter web test:cov

      - name: Run integration tests
        run: pnpm --filter api test:integration
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/strivpath_test

      - name: Run E2E tests
        run: pnpm --filter api test:e2e
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/strivpath_test
          NODE_ENV: test
          PORT: 3011
          JWT_ACCESS_TOKEN_SECRET: release-test-access-secret-key
          JWT_REFRESH_TOKEN_SECRET: release-test-refresh-secret-key
          JWT_ACCESS_TOKEN_EXPIRATION: 15m
          JWT_REFRESH_TOKEN_EXPIRATION: 7d
          STRAVA_CLIENT_ID: test-client-id
          STRAVA_CLIENT_SECRET: test-client-secret
          STRAVA_REDIRECT_URI: http://localhost:3011/v1/auth/strava/callback
          FRONTEND_URL: http://localhost:3000
          THROTTLE_DEFAULT_TTL: 60000
          THROTTLE_DEFAULT_LIMIT: 100
          TOKEN_CLEANUP_ENABLED: false

  # ---------------------------------------------------------------------------
  # Build & Push - Create Docker images and push to GHCR
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate GraphQL types
        run: pnpm --filter web codegen

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          platforms: linux/amd64,linux/arm64

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.WEB_IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_GRAPHQL_URL=https://api.strivpath.${{ secrets.MY_DOMAIN }}/graphql
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          platforms: linux/amd64,linux/arm64

  # ---------------------------------------------------------------------------
  # Deploy - Trigger Dokploy deployment
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - name: Trigger Dokploy deployment
        run: |
          VERSION="${{ needs.build-and-push.outputs.version }}"
          echo "Triggering deployment for version $VERSION"

          RESPONSE=$(curl -sL -w "\n%{http_code}" -X POST "${{ secrets.DOKPLOY_URL }}/api/compose.deploy" \
            -H "x-api-key: ${{ secrets.DOKPLOY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"composeId\": \"${{ secrets.DOKPLOY_COMPOSE_ID }}\", \"title\": \"v${VERSION}\", \"description\": \"Deployed from GitHub Actions (commit: ${{ github.sha }})\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "Response code: $HTTP_CODE"
          echo "Response body: $BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Deployment trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi

          echo "Deployment triggered successfully"

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to complete..."
          sleep 90

      - name: Health check
        run: |
          echo "Running health checks..."
          DOMAIN="${{ secrets.MY_DOMAIN }}"

          # Check API health
          for i in {1..12}; do
            echo "Attempt $i: Checking API health..."
            if curl -sf "https://api.strivpath.${DOMAIN}/health" > /dev/null 2>&1; then
              echo "API health check passed!"
              API_HEALTHY=true
              break
            fi
            echo "API not ready, retrying in 10s..."
            sleep 10
          done

          if [ "$API_HEALTHY" != "true" ]; then
            echo "API health check failed after 12 attempts"
            exit 1
          fi

          # Check Web health
          for i in {1..12}; do
            echo "Attempt $i: Checking Web health..."
            if curl -sf "https://strivpath.${DOMAIN}/api/health" > /dev/null 2>&1; then
              echo "Web health check passed!"
              WEB_HEALTHY=true
              break
            fi
            echo "Web not ready, retrying in 10s..."
            sleep 10
          done

          if [ "$WEB_HEALTHY" != "true" ]; then
            echo "Web health check failed after 12 attempts"
            exit 1
          fi

          echo "All health checks passed! Deployment successful."
